<!DOCTYPE html>
<html>
<head><title>Simple Camera Test</title></head>
<body>
    <video id="myVideo" autoplay playsinline></video>
    <button onclick="startTest()">Test Camera</button>
    <p id="status">Click button</p>
    <script>
        async function startTest() {
            document.getElementById('status').innerText = 'Requesting...';
            console.log('Simple Test: Attempting getUserMedia');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('myVideo').srcObject = stream;
                document.getElementById('status').innerText = 'Success!';
                console.log('Simple Test: Success', stream);
            } catch (err) {
                document.getElementById('status').innerText = `Error: ${err.name} - ${err.message}`;
                console.error('Simple Test: Error', err);
            }
        }
    </script>
</body>
</html>
