<!DOCTYPE html>
<html>
<head>
    <title>Multi-Camera Selector Test</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        video {
            width: 640px;
            height: 480px;
            border: 1px solid black;
            background-color: #333;
        }
        #controls { margin-bottom: 10px; }
        label { margin-right: 5px; }
        select, button { padding: 8px; margin-right: 10px; }
    </style>
</head>
<body>
    <h1>Camera Selector</h1>

    <div id="controls">
        <label for="cameraSelect">Select Camera:</label>
        <select id="cameraSelect" disabled></select>
        <button id="startButton" onclick="startSelectedCamera()">Start Selected Camera</button>
        <button id="populateButton" onclick="populateCameraList()">Scan for Cameras</button>
    </div>

    <video id="myVideo" autoplay playsinline></video>
    <p id="status">Click "Scan for Cameras" then select and start.</p>

    <script>
        const videoElement = document.getElementById('myVideo');
        const cameraSelect = document.getElementById('cameraSelect');
        const statusElement = document.getElementById('status');
        const startButton = document.getElementById('startButton');
        const populateButton = document.getElementById('populateButton');
        let currentStream = null;
        let videoDevices = [];

        // Function to populate the camera dropdown
        async function populateCameraList() {
            statusElement.innerText = 'Scanning for cameras... Please grant permission if prompted.';
            cameraSelect.innerHTML = '<option value="">Loading...</option>'; // Placeholder
            cameraSelect.disabled = true;
            startButton.disabled = true;
            populateButton.disabled = true;

            try {
                // Request permission first to ensure labels are available
                // We can request a generic stream and then stop it.
                const tempStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                tempStream.getTracks().forEach(track => track.stop()); // Stop the temporary stream

                const devices = await navigator.mediaDevices.enumerateDevices();
                videoDevices = devices.filter(device => device.kind === 'videoinput');

                cameraSelect.innerHTML = ''; // Clear previous options

                if (videoDevices.length === 0) {
                    statusElement.innerText = 'No video input devices found.';
                    cameraSelect.innerHTML = '<option value="">No cameras found</option>';
                    populateButton.disabled = false;
                    return;
                }

                videoDevices.forEach((device, index) => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    // Use label if available, otherwise a generic name
                    option.text = device.label || `Camera ${index + 1} (ID: ${device.deviceId.substring(0, 8)}...)`;
                    cameraSelect.appendChild(option);
                });

                cameraSelect.disabled = false;
                startButton.disabled = false;
                statusElement.innerText = 'Select a camera and click "Start Selected Camera".';
                // Optional: Automatically start the first camera
                // if (videoDevices.length > 0) {
                //     cameraSelect.value = videoDevices[0].deviceId;
                //     startSelectedCamera();
                // }

            } catch (err) {
                statusElement.innerText = `Error populating cameras: ${err.name} - ${err.message}`;
                console.error('Error populating camera list:', err);
                cameraSelect.innerHTML = '<option value="">Error loading cameras</option>';
            } finally {
                populateButton.disabled = false; // Re-enable scan button
            }
        }

        // Function to start the selected camera
        async function startSelectedCamera() {
            const selectedDeviceId = cameraSelect.value;

            if (!selectedDeviceId) {
                statusElement.innerText = 'Please select a camera first.';
                return;
            }

            // Stop any existing stream
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                console.log('Simple Test: Stopped previous stream');
            }

            statusElement.innerText = 'Requesting selected camera...';
            console.log(`Simple Test: Attempting getUserMedia for deviceId: ${selectedDeviceId}`);

            const constraints = {
                video: { deviceId: { exact: selectedDeviceId } }
            };

            try {
                currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                videoElement.srcObject = currentStream;
                videoElement.play(); // Ensure playback
                statusElement.innerText = `Success! Streaming from: ${cameraSelect.options[cameraSelect.selectedIndex].text}`;
                console.log('Simple Test: Success', currentStream);
            } catch (err) {
                statusElement.innerText = `Error starting camera: ${err.name} - ${err.message}`;
                console.error('Simple Test: Error starting camera', err);
                currentStream = null; // Reset currentStream on error
            }
        }

        // Add event listener to start camera on selection change (optional UX improvement)
        // cameraSelect.addEventListener('change', startSelectedCamera);

        // Initial state
        statusElement.innerText = 'Click "Scan for Cameras" to begin.';
        startButton.disabled = true;

    </script>
</body>
</html>
